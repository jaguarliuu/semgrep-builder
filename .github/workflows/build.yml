name: Build Semgrep Windows Executable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller semgrep

      - name: Find semgrep entry point
        id: find-entry
        shell: python
        run: |
          import semgrep
          import os
          # semgrep's __main__.py is the entry point
          # Try to find it
          import semgrep.__main__
          main_path = os.path.dirname(semgrep.__main__.__file__)
          entry = os.path.join(main_path, '__main__.py')
          print(f"entry={entry}")

      - name: Build with PyInstaller
        shell: python
        run: |
          import subprocess
          import sys
          import os
          import semgrep.__main__
          main_dir = os.path.dirname(semgrep.__main__.__file__)
          entry = os.path.join(main_dir, '__main__.py')
          print(f"Building from {entry}")

      - name: PyInstaller single-file build
        run: |
          python -c "import semgrep.__main__; import os; print(os.path.dirname(semgrep.__main__.__file__))"
          set ENTRY_DIR=python -c "import semgrep.__main__; import os; print(os.path.dirname(semgrep.__main__.__file__))"

      - name: Run PyInstaller
        run: |
          for /f "delims=" %%i in ('python -c "import semgrep.__main__; import os; print(os.path.dirname(semgrep.__main__.__file__))"') do set ENTRY_DIR=%%i
          pyinstaller --onefile --console-only ^
            --hidden-import semgrep ^
            --hidden-import semgrep.cli ^
            --hidden-import semgrep.cli.cmds ^
            --hidden-import semgrep.rule ^
            --hidden-import semgrep.rule_match ^
            --hidden-import semgrep.engine ^
            --hidden-import semgrep.target_manager ^
            --hidden-import semgrep.constants ^
            --hidden-import semgrep.error ^
            --hidden-import semgrep.git ^
            --hidden-import semgrep.pattern ^
            --hidden-import semgrep.pmatch ^
            --hidden-import semgrep.profiling ^
            --hidden-import semgrep.rule_board ^
            --hidden-import semgrep.semgrep_main ^
            --hidden-import semgrep.skip_list ^
            --hidden-import semgrep.timeout ^
            --hidden-import semgrep.version ^
            --collect-all semgrep ^
            --name semgrep.exe ^
            "%ENTRY_DIR%\__main__.py"

      - name: Show output
        run: |
          dir build\*.exe 2>nul || dir dist\*.exe 2>nul
          for %%f in (dist\semgrep.exe build\semgrep.exe) do (
            if exist "%%f" echo %%~nxf: %%~zf bytes
          )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-windows-exe
          path: |
            dist/semgrep.exe
          retention-days: 5

      - name: Display artifact info
        run: |
          echo "Artifact will be available at:"
          echo "https://github.com/jaguarliuu/semgrep-builder/actions/runs/${{ github.run_id }}"

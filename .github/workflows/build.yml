name: Build Semgrep Windows Executable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller semgrep

      - name: Run build script
        run: python build.py

      - name: Show output
        run: |
          if (Test-Path dist\semgrep.exe) {
            echo "SUCCESS: dist\semgrep.exe"
            Get-Item dist\semgrep.exe | Select-Object Name, Length
          } else {
            echo "File not found"
            if (Test-Path build\) { dir build\ }
            if (Test-Path dist\) { dir dist\ }
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-windows-exe
          path: |
            dist/semgrep.exe
          retention-days: 5

name: Build Semgrep Windows Executable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller semgrep

      - name: Build with PyInstaller
        run: |
          python -c "
          import semgrep.__main__
          import os
          import subprocess
          import sys

          entry = os.path.dirname(semgrep.__main__.__file__)
          main_py = os.path.join(entry, '__main__.py')
          print(f'Entry point: {main_py}')

          # Build with PyInstaller using semgrep's __main__.py as entry
          result = subprocess.run([
              sys.executable, '-m', 'PyInstaller',
              '--onefile',
              '-c',
              '--name', 'semgrep',
              '--distpath', 'dist',
              '--workpath', 'build',
              '--add-hidden-import', 'semgrep',
              '--add-hidden-import', 'semgrep.cli',
              '--add-hidden-import', 'semgrep.cli.cmds',
              '--add-hidden-import', 'semgrep.rule',
              '--add-hidden-import', 'semgrep.rule_match',
              '--add-hidden-import', 'semgrep.engine',
              '--add-hidden-import', 'semgrep.target_manager',
              '--add-hidden-import', 'semgrep.constants',
              '--add-hidden-import', 'semgrep.error',
              '--add-hidden-import', 'semgrep.git',
              '--add-hidden-import', 'semgrep.pattern',
              '--add-hidden-import', 'semgrep.pmatch',
              '--add-hidden-import', 'semgrep.profiling',
              '--add-hidden-import', 'semgrep.rule_board',
              '--add-hidden-import', 'semgrep.semgrep_main',
              '--add-hidden-import', 'semgrep.skip_list',
              '--add-hidden-import', 'semgrep.timeout',
              '--add-hidden-import', 'semgrep.version',
              '--collect-all', 'semgrep',
              main_py
          ], capture_output=False)
          sys.exit(result)
          "

      - name: Show output
        run: |
          dir dist\semgrep.exe 2>nul && dir dist\semgrep.exe
          if not exist dist\semgrep.exe (
            echo === Checking build dir ===
            dir build\ 2>nul
          )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-windows-exe
          path: |
            dist/semgrep.exe
          retention-days: 5

      - name: Display artifact info
        run: |
          echo Build complete!
          echo Artifact: https://github.com/jaguarliuu/semgrep-builder/actions/runs/%GITHUB_RUN_ID%

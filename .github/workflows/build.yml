name: Build Semgrep Windows Executable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller semgrep

      - name: Run build script
        run: python build.py

      - name: Show output
        run: |
          if exist dist\semgrep.exe (
            echo SUCCESS: dist\semgrep.exe
            for %%A in (dist\semgrep.exe) do echo Size: %%~zA bytes
          ) else (
            echo File not found, checking build dir...
            dir build\ 2>nul
            dir dist\ 2>nul
          )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-windows-exe
          path: |
            dist/semgrep.exe
          retention-days: 5
